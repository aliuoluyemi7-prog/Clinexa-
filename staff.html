<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinexa — Staff</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 460px;
    margin: 20px auto;
    padding: 0 16px 60px;
    color: #1a1a1a;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h2 { font-size: 15px; color: #555; margin-top: 28px; }
  input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: 600;
  }
  button:disabled { background: #9ca3af; }
  button.secondary { background: #6b7280; }
  button.danger { background: #dc2626; }
  #result {
    margin-top: 16px;
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #result.success { background: #dcfce7; color: #166534; }
  #result.error { background: #fee2e2; color: #991b1b; }
  #result.loading { background: #dbeafe; color: #1e40af; }
  .staff-card {
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
  }
  .staff-card .name { font-weight: 600; font-size: 15px; }
  .staff-card .meta { font-size: 13px; color: #666; margin-top: 2px; }
  .staff-card .badge {
    display: inline-block;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 6px;
  }
  .badge.active { background: #dcfce7; color: #166534; }
  .badge.inactive { background: #fee2e2; color: #991b1b; }
  .staff-card .actions { margin-top: 8px; display: flex; gap: 8px; }
  .staff-card .actions button { margin-top: 0; font-size: 13px; padding: 8px; }
</style>
</head>
<body>

  <h1>Clinexa — Staff</h1>
  <p style="color:#666; font-size:14px;">Manage clinic staff and PINs.</p>

  <div id="result" class="loading">Loading…</div>

  <div id="authGate" style="display:none;">
    <p>You need to be logged in to manage staff. <a href="login.html">Go to login</a></p>
  </div>

  <div id="staffApp" style="display:none;">

    <h2>Add Staff</h2>
    <input type="text" id="staffName" placeholder="Full name">
    <input type="text" id="staffPhone" placeholder="Phone (optional)">
    <select id="staffRole">
      <option value="">Select role</option>
      <option value="Doctor">Doctor</option>
      <option value="Nurse">Nurse</option>
      <option value="Receptionist">Receptionist</option>
      <option value="Lab">Lab</option>
      <option value="Pharmacy">Pharmacy</option>
      <option value="Admin">Admin</option>
      <option value="Other">Other</option>
    </select>
    <input type="text" id="staffDepartment" placeholder="Department (e.g. Outpatient)">
    <input type="number" id="staffBasicSalary" placeholder="Basic Salary (₦)" min="0">
    <input type="number" id="staffTransport" placeholder="Transport Allowance (₦)" min="0">
    <input type="number" id="staffHousing" placeholder="Housing Allowance (₦)" min="0">
    <input type="number" id="staffOtherAllowance" placeholder="Other Allowance (₦)" min="0">
    <input type="text" id="staffPin" placeholder="4-digit PIN" maxlength="6" inputmode="numeric">
    <button id="addStaffBtn" disabled>Add Staff</button>

    <h2>Staff List</h2>
    <input type="text" id="searchBox" placeholder="Search by name or role…">

    <div id="editPanel" style="display:none; border: 2px solid #2563eb; border-radius: 8px; padding: 12px; margin-top: 12px;">
      <h2 style="margin-top:0;">Edit Staff</h2>
      <input type="text" id="editName" placeholder="Full name">
      <input type="text" id="editPhone" placeholder="Phone (optional)">
      <select id="editRole">
        <option value="">Select role</option>
        <option value="Doctor">Doctor</option>
        <option value="Nurse">Nurse</option>
        <option value="Receptionist">Receptionist</option>
        <option value="Lab">Lab</option>
        <option value="Pharmacy">Pharmacy</option>
        <option value="Admin">Admin</option>
        <option value="Other">Other</option>
      </select>
      <input type="number" id="editBasicSalary" placeholder="Basic Salary (₦)" min="0">
      <input type="number" id="editTransport" placeholder="Transport Allowance (₦)" min="0">
      <input type="number" id="editHousing" placeholder="Housing Allowance (₦)" min="0">
      <input type="number" id="editOtherAllowance" placeholder="Other Allowance (₦)" min="0">
      <input type="text" id="editNewPin" placeholder="New PIN (leave blank to keep current)" maxlength="6" inputmode="numeric">
      <button id="saveEditBtn">Save Changes</button>
      <button id="cancelEditBtn" class="secondary">Cancel</button>
    </div>

    <div id="staffList"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    const resultEl = document.getElementById('result');
    const authGateEl = document.getElementById('authGate');
    const staffAppEl = document.getElementById('staffApp');
    const staffListEl = document.getElementById('staffList');

    function showResult(obj, state) {
      resultEl.style.display = 'block';
      resultEl.className = state;
      resultEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }
    function hideResult() {
      resultEl.style.display = 'none';
    }

    window.addEventListener('error', (e) => {
      showResult({ uncaught_error: e.message, filename: e.filename, line: e.lineno }, 'error');
    });

    const SUPABASE_URL = 'https://ktmlvkocrbkjnihixock.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0bWx2a29jcmJram5paGl4b2NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzgzMzgsImV4cCI6MjEwMDI1NDMzOH0.PCFlaGJFejfSR3VSHo_HjgNOL2Q7CrZZqN0HEgsev-0';

    let supabaseClient;
    let currentClinicId = null;

    // ---- Salted PIN hashing (Web Crypto API) ----
    async function hashPin(salt, clinicId, pin) {
      const encoder = new TextEncoder();
      const data = encoder.encode(`${salt}:${clinicId}:${pin}`);
      const hashBuffer = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hashBuffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    // Check the candidate PIN against every active staff member's existing
    // salt+hash. Necessary because salted hashes no longer collide for
    // identical PINs, so the database can't catch duplicates by itself.
    async function isPinTaken(clinicId, candidatePin, excludeStaffId = null) {
      const { data, error } = await supabaseClient
        .from('staff')
        .select('id, pin_hash, pin_salt')
        .eq('status', 'active');

      if (error) throw error;

      for (const s of data) {
        if (excludeStaffId && s.id === excludeStaffId) continue;
        if (!s.pin_salt) continue;
        const candidateHash = await hashPin(s.pin_salt, clinicId, candidatePin);
        if (candidateHash === s.pin_hash) return true;
      }
      return false;
    }

    async function init() {
      try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
        });
      } catch (err) {
        showResult({ supabase_init_failed: err.message || String(err) }, 'error');
        return;
      }

      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) {
        hideResult();
        authGateEl.style.display = 'block';
        return;
      }

      const authUserId = sessionData.session.user.id;
      const { data: profile, error: profileError } = await supabaseClient
        .from('users')
        .select('clinic_id, role')
        .eq('id', authUserId)
        .single();

      if (profileError || !profile) {
        showResult({ error: 'Could not load your clinic profile. Try logging in again.' }, 'error');
        authGateEl.style.display = 'block';
        return;
      }

      currentClinicId = profile.clinic_id;
      hideResult();
      staffAppEl.style.display = 'block';
      document.getElementById('addStaffBtn').disabled = false;
      loadStaffList();
    }

    async function loadStaffList(searchTerm = '') {
      const { data, error } = await supabaseClient
        .from('staff')
        .select('id, first_name, last_name, phone, position, department_id, status')
        .order('created_at', { ascending: false });

      if (error) {
        staffListEl.innerHTML = `<p style="color:#991b1b;">Failed to load staff: ${error.message}</p>`;
        return;
      }

      const filtered = searchTerm
        ? data.filter(s =>
            `${s.first_name} ${s.last_name}`.toLowerCase().includes(searchTerm.toLowerCase()) ||
            (s.position || '').toLowerCase().includes(searchTerm.toLowerCase())
          )
        : data;

      if (filtered.length === 0) {
        staffListEl.innerHTML = `<p style="color:#666; font-size:14px;">No staff found.</p>`;
        return;
      }

      staffListEl.innerHTML = filtered.map(s => `
        <div class="staff-card" data-id="${s.id}">
          <div class="name">${escapeHtml(s.first_name)} ${escapeHtml(s.last_name)}</div>
          <div class="meta">${escapeHtml(s.position || 'No role set')}${s.phone ? ' · ' + escapeHtml(s.phone) : ''}</div>
          <span class="badge ${s.status}">${s.status}</span>
          <div class="actions">
            <button class="secondary edit-staff" data-id="${s.id}">Edit</button>
            <button class="secondary toggle-status" data-id="${s.id}" data-status="${s.status}">
              ${s.status === 'active' ? 'Deactivate' : 'Activate'}
            </button>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.edit-staff').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const { data: staffRow, error } = await supabaseClient
            .from('staff')
            .select('*')
            .eq('id', id)
            .single();

          if (error || !staffRow) {
            showResult({ error: 'Could not load staff details.' }, 'error');
            return;
          }

          document.getElementById('editPanel').dataset.staffId = id;
          document.getElementById('editName').value = `${staffRow.first_name} ${staffRow.last_name === '-' ? '' : staffRow.last_name}`.trim();
          document.getElementById('editPhone').value = staffRow.phone || '';
          document.getElementById('editRole').value = staffRow.position || '';
          document.getElementById('editBasicSalary').value = staffRow.basic_salary || '';
          document.getElementById('editTransport').value = staffRow.transport_allowance || '';
          document.getElementById('editHousing').value = staffRow.housing_allowance || '';
          document.getElementById('editOtherAllowance').value = staffRow.other_allowance || '';
          document.getElementById('editNewPin').value = '';

          document.getElementById('editPanel').style.display = 'block';
          document.getElementById('editPanel').scrollIntoView({ behavior: 'smooth' });
        });
      });

      document.querySelectorAll('.toggle-status').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-id');
          const currentStatus = btn.getAttribute('data-status');
          const newStatus = currentStatus === 'active' ? 'inactive' : 'active';

          const { error } = await supabaseClient
            .from('staff')
            .update({ status: newStatus })
            .eq('id', id);

          if (error) {
            showResult({ update_failed: error.message }, 'error');
            return;
          }
          loadStaffList(document.getElementById('searchBox').value.trim());
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    document.getElementById('addStaffBtn').addEventListener('click', async () => {
      const fullName = document.getElementById('staffName').value.trim();
      const phone = document.getElementById('staffPhone').value.trim();
      const role = document.getElementById('staffRole').value;
      const department = document.getElementById('staffDepartment').value.trim();
      const basicSalary = parseFloat(document.getElementById('staffBasicSalary').value) || 0;
      const transport = parseFloat(document.getElementById('staffTransport').value) || 0;
      const housing = parseFloat(document.getElementById('staffHousing').value) || 0;
      const otherAllowance = parseFloat(document.getElementById('staffOtherAllowance').value) || 0;
      const pin = document.getElementById('staffPin').value.trim();

      if (!fullName || !role || !pin) {
        showResult({ error: 'Name, role, and PIN are required.' }, 'error');
        return;
      }
      if (!/^\d{4,6}$/.test(pin)) {
        showResult({ error: 'PIN must be 4 to 6 digits.' }, 'error');
        return;
      }

      showResult('Checking PIN availability…', 'loading');

      try {
        const taken = await isPinTaken(currentClinicId, pin);
        if (taken) {
          showResult({ error: 'That PIN is already in use by another active staff member. Choose a different one.' }, 'error');
          return;
        }

        showResult('Saving staff member…', 'loading');

        const nameParts = fullName.split(' ');
        const firstName = nameParts[0];
        const lastName = nameParts.slice(1).join(' ') || '-';

        const salt = crypto.randomUUID();
        const pinHash = await hashPin(salt, currentClinicId, pin);

        const { data, error } = await supabaseClient.from('staff').insert({
          id: crypto.randomUUID(),
          clinic_id: currentClinicId,
          first_name: firstName,
          last_name: lastName,
          phone: phone || null,
          position: role,
          basic_salary: basicSalary,
          transport_allowance: transport,
          housing_allowance: housing,
          other_allowance: otherAllowance,
          pin_hash: pinHash,
          pin_salt: salt,
          status: 'active'
        }).select().single();

        if (error) {
          showResult({ error: `Failed to add staff: ${error.message}` }, 'error');
          return;
        }

        showResult({ success: true, added: `${firstName} ${lastName}` }, 'success');

        document.getElementById('staffName').value = '';
        document.getElementById('staffPhone').value = '';
        document.getElementById('staffRole').value = '';
        document.getElementById('staffDepartment').value = '';
        document.getElementById('staffBasicSalary').value = '';
        document.getElementById('staffTransport').value = '';
        document.getElementById('staffHousing').value = '';
        document.getElementById('staffOtherAllowance').value = '';
        document.getElementById('staffPin').value = '';

        loadStaffList();
      } catch (err) {
        showResult({ error: err.message || String(err) }, 'error');
      }
    });

    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('editPanel').style.display = 'none';
    });

    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      const staffId = document.getElementById('editPanel').dataset.staffId;
      const fullName = document.getElementById('editName').value.trim();
      const phone = document.getElementById('editPhone').value.trim();
      const role = document.getElementById('editRole').value;
      const basicSalary = parseFloat(document.getElementById('editBasicSalary').value) || 0;
      const transport = parseFloat(document.getElementById('editTransport').value) || 0;
      const housing = parseFloat(document.getElementById('editHousing').value) || 0;
      const otherAllowance = parseFloat(document.getElementById('editOtherAllowance').value) || 0;
      const newPin = document.getElementById('editNewPin').value.trim();

      if (!fullName || !role) {
        showResult({ error: 'Name and role are required.' }, 'error');
        return;
      }

      showResult('Saving…', 'loading');

      try {
        const nameParts = fullName.split(' ');
        const firstName = nameParts[0];
        const lastName = nameParts.slice(1).join(' ') || '-';

        const updateData = {
          first_name: firstName,
          last_name: lastName,
          phone: phone || null,
          position: role,
          basic_salary: basicSalary,
          transport_allowance: transport,
          housing_allowance: housing,
          other_allowance: otherAllowance
        };

        if (newPin) {
          if (!/^\d{4,6}$/.test(newPin)) {
            showResult({ error: 'New PIN must be 4 to 6 digits.' }, 'error');
            return;
          }
          const taken = await isPinTaken(currentClinicId, newPin, staffId);
          if (taken) {
            showResult({ error: 'That PIN is already in use by another active staff member.' }, 'error');
            return;
          }
          const newSalt = crypto.randomUUID();
          updateData.pin_salt = newSalt;
          updateData.pin_hash = await hashPin(newSalt, currentClinicId, newPin);
        }

        const { error } = await supabaseClient
          .from('staff')
          .update(updateData)
          .eq('id', staffId);

        if (error) {
          showResult({ error: `Failed to save: ${error.message}` }, 'error');
          return;
        }

        showResult({ success: true, updated: fullName }, 'success');
        document.getElementById('editPanel').style.display = 'none';
        loadStaffList();
      } catch (err) {
        showResult({ error: err.message || String(err) }, 'error');
      }
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
      loadStaffList(e.target.value.trim());
    });

    init();
  </script>

</body>
</html>
