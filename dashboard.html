<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinexa — Dashboard</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 460px;
    margin: 20px auto;
    padding: 0 16px 60px;
    color: #1a1a1a;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h2 { font-size: 15px; color: #555; margin-top: 26px; margin-bottom: 8px; }

  #result {
    margin-top: 16px;
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    white-space: pre-wrap;
    display: none;
  }
  #result.error { background: #fee2e2; color: #991b1b; display: block; }
  #result.loading { background: #dbeafe; color: #1e40af; display: block; }

  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .kpi-card {
    background: #f8f9fb;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .kpi-card .icon { font-size: 22px; }
  .kpi-card .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
  .kpi-card .label { font-size: 12px; color: #666; margin-top: 2px; }

  .event-row, .payroll-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 14px;
  }
  .event-row .event-name { font-weight: 600; }
  .event-row .event-time { color: #666; font-size: 12px; }
  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .badge.clock_in { background: #dcfce7; color: #166534; }
  .badge.clock_out { background: #fee2e2; color: #991b1b; }
  .badge.draft { background: #fef3c7; color: #92400e; }
  .badge.approved { background: #dcfce7; color: #166534; }

  .payroll-row a {
    font-size: 12px;
    color: #2563eb;
    font-weight: 600;
    text-decoration: none;
  }

  .quick-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 12px;
  }
  .quick-actions a {
    display: block;
    text-align: center;
    padding: 14px 0;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }

  .empty-note { font-size: 13px; color: #888; margin-top: 8px; }
</style>
</head>
<body>

  <h1>Clinexa — Dashboard</h1>
  <p style="color:#666; font-size:14px;">Today's snapshot.</p>

  <div id="authGate" style="display:none;">
    <p>Log in first. <a href="login.html">Go to login</a></p>
  </div>

  <div id="result"></div>

  <div id="dashboardApp" style="display:none;">

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="icon">👥</div>
        <div class="value" id="kpiTotalStaff">–</div>
        <div class="label">Total Staff</div>
      </div>
      <div class="kpi-card">
        <div class="icon">✅</div>
        <div class="value" id="kpiPresentToday">–</div>
        <div class="label">Present Today</div>
      </div>
      <div class="kpi-card">
        <div class="icon">💰</div>
        <div class="value" id="kpiMonthPayroll">–</div>
        <div class="label">This Month's Approved Payroll</div>
      </div>
      <div class="kpi-card">
        <div class="icon">⏳</div>
        <div class="value" id="kpiPendingRuns">–</div>
        <div class="label">Pending Payroll Runs</div>
      </div>
    </div>

    <h2>Today's Attendance</h2>
    <div id="attendanceFeed"></div>

    <h2>Recent Payroll</h2>
    <div id="payrollFeed"></div>

    <h2>Quick Actions</h2>
    <div class="quick-actions">
      <a href="staff.html">➕ Add Staff</a>
      <a href="attendance.html">🕒 Attendance</a>
      <a href="payroll.html">💵 Payroll</a>
      <a href="payslip.html">📄 Payslips</a>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    const SUPABASE_URL = 'https://ktmlvkocrbkjnihixock.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0bWx2a29jcmJram5paGl4b2NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzgzMzgsImV4cCI6MjEwMDI1NDMzOH0.PCFlaGJFejfSR3VSHo_HjgNOL2Q7CrZZqN0HEgsev-0';

    let supabaseClient;
    let currentClinicId = null;

    const resultEl = document.getElementById('result');
    function showResult(msg, state) {
      resultEl.className = state;
      resultEl.textContent = msg;
    }

    const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    async function init() {
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
      });

      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) {
        document.getElementById('authGate').style.display = 'block';
        return;
      }

      const userId = sessionData.session.user.id;
      const { data: profile, error } = await supabaseClient
        .from('users')
        .select('clinic_id')
        .eq('id', userId)
        .single();

      if (error || !profile) {
        showResult('Could not load your clinic profile.', 'error');
        document.getElementById('authGate').style.display = 'block';
        return;
      }

      currentClinicId = profile.clinic_id;
      document.getElementById('dashboardApp').style.display = 'block';

      loadKpis();
      loadAttendanceFeed();
      loadPayrollFeed();
    }

    async function loadKpis() {
      const { data: staffData } = await supabaseClient
        .from('staff')
        .select('id')
        .eq('status', 'active');
      document.getElementById('kpiTotalStaff').textContent = staffData ? staffData.length : '0';

      const now = new Date();
      const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
      const todayEnd = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1).toISOString();

      const { data: todayEvents } = await supabaseClient
        .from('attendance')
        .select('staff_id, event_type')
        .gte('event_time', todayStart)
        .lt('event_time', todayEnd)
        .eq('event_type', 'clock_in');

      const presentSet = new Set((todayEvents || []).map(e => e.staff_id));
      document.getElementById('kpiPresentToday').textContent = presentSet.size;

      const thisMonth = now.getMonth() + 1;
      const thisYear = now.getFullYear();

      const { data: monthRun } = await supabaseClient
        .from('payroll_runs')
        .select('id, status')
        .eq('month', thisMonth)
        .eq('year', thisYear)
        .limit(1);

      if (monthRun && monthRun.length > 0 && monthRun[0].status === 'approved') {
        const { data: items } = await supabaseClient
          .from('payroll_items')
          .select('approved_net_pay')
          .eq('payroll_run_id', monthRun[0].id);
        const total = (items || []).reduce((sum, i) => sum + parseFloat(i.approved_net_pay || 0), 0);
        document.getElementById('kpiMonthPayroll').textContent = `₦${total.toLocaleString()}`;
      } else {
        document.getElementById('kpiMonthPayroll').textContent = '₦0';
      }

      const { data: draftRuns } = await supabaseClient
        .from('payroll_runs')
        .select('id')
        .eq('status', 'draft');
      document.getElementById('kpiPendingRuns').textContent = draftRuns ? draftRuns.length : '0';
    }

    async function loadAttendanceFeed() {
      const feedEl = document.getElementById('attendanceFeed');

      const { data: events, error } = await supabaseClient
        .from('attendance')
        .select('id, event_type, event_time, staff:staff_id (first_name, last_name)')
        .order('event_time', { ascending: false })
        .limit(10);

      if (error) {
        feedEl.innerHTML = `<p class="empty-note">Could not load attendance: ${error.message}</p>`;
        return;
      }
      if (!events || events.length === 0) {
        feedEl.innerHTML = `<p class="empty-note">No attendance events yet.</p>`;
        return;
      }

      feedEl.innerHTML = events.map(e => {
        const name = e.staff ? `${e.staff.first_name} ${e.staff.last_name}` : 'Unknown staff';
        const time = new Date(e.event_time).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const label = e.event_type === 'clock_in' ? 'Clock In' : 'Clock Out';
        return `
          <div class="event-row">
            <div>
              <div class="event-name">${escapeHtml(name)}</div>
              <div class="event-time">${time}</div>
            </div>
            <span class="badge ${e.event_type}">${label}</span>
          </div>
        `;
      }).join('');
    }

    async function loadPayrollFeed() {
      const feedEl = document.getElementById('payrollFeed');

      const { data: runs, error } = await supabaseClient
        .from('payroll_runs')
        .select('id, month, year, status')
        .order('year', { ascending: false })
        .order('month', { ascending: false })
        .limit(5);

      if (error) {
        feedEl.innerHTML = `<p class="empty-note">Could not load payroll: ${error.message}</p>`;
        return;
      }
      if (!runs || runs.length === 0) {
        feedEl.innerHTML = `<p class="empty-note">No payroll runs yet.</p>`;
        return;
      }

      const rowsHtml = await Promise.all(runs.map(async (run) => {
        const { data: items } = await supabaseClient
          .from('payroll_items')
          .select('approved_net_pay, calculated_net_pay')
          .eq('payroll_run_id', run.id);

        const total = (items || []).reduce((sum, i) =>
          sum + parseFloat(i.approved_net_pay || i.calculated_net_pay || 0), 0);

        return `
          <div class="payroll-row">
            <div>
              <div class="event-name">${monthNames[run.month - 1]} ${run.year}</div>
              <span class="badge ${run.status}">${run.status}</span>
            </div>
            <div style="text-align:right;">
              <div>₦${total.toLocaleString()}</div>
              <a href="payroll.html">Open →</a>
            </div>
          </div>
        `;
      }));

      feedEl.innerHTML = rowsHtml.join('');
    }

    init();
  </script>

</body>
</html>
