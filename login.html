<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinexa — Login</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    padding: 0 20px;
    color: #1a1a1a;
  }
  h1 { font-size: 20px; margin-bottom: 4px; }
  h2 { font-size: 15px; color: #555; margin-top: 32px; }
  input {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background: #2563eb;
    color: white;
    font-size: 15px;
    font-weight: 600;
  }
  button:active { opacity: 0.8; }
  button:disabled { background: #9ca3af; }
  #result {
    margin-top: 20px;
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #result.success { background: #dcfce7; color: #166534; }
  #result.error { background: #fee2e2; color: #991b1b; }
  #result.loading { background: #dbeafe; color: #1e40af; }
</style>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="theme-color" content="#2563eb">
</head>
<body>

  <h1>Clinexa</h1>
  <p style="color:#666; font-size:14px;">Test page — signup, login, session check</p>

  <div id="result" class="loading">Loading Supabase library… please wait.</div>

  <h2>Register Clinic</h2>
  <input type="text" id="clinicName" placeholder="Clinic name (e.g. Wellspring Clinic)">
  <input type="email" id="signupEmail" placeholder="Email">
  <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
  <button id="signupBtn" disabled>Register Clinic</button>

  <h2>Login</h2>
  <input type="email" id="loginEmail" placeholder="Email">
  <input type="password" id="loginPassword" placeholder="Password">
  <button id="loginBtn" disabled>Log In</button>

  <h2>Session</h2>
  <button id="checkSessionBtn" disabled>Check Current Session</button>
  <button id="logoutBtn" disabled style="background:#6b7280;">Log Out</button>

  <!-- Classic script tag (not type="module") — loads the Supabase UMD build.
       More reliable than ES module CDN imports on slow/unstable connections,
       and gives us a plain global `supabase` object to work with. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script>
    const resultEl = document.getElementById('result');

    function showResult(obj, state) {
      // state: 'success' | 'error' | 'loading'
      resultEl.className = state;
      resultEl.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
    }

    window.addEventListener('error', (e) => {
      showResult({
        uncaught_error: e.message,
        filename: e.filename,
        line: e.lineno
      }, 'error');
    });

    // ---- Supabase client setup ----
    const SUPABASE_URL = 'https://ktmlvkocrbkjnihixock.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0bWx2a29jcmJram5paGl4b2NrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NzgzMzgsImV4cCI6MjEwMDI1NDMzOH0.PCFlaGJFejfSR3VSHo_HjgNOL2Q7CrZZqN0HEgsev-0';

    let supabaseClient;

    try {
      // The UMD build exposes a global `supabase` object with `.createClient`
      supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: false }
      });
      showResult('Supabase loaded successfully. Ready to test.', 'success');

      // Enable buttons now that the client is ready
      document.getElementById('signupBtn').disabled = false;
      document.getElementById('loginBtn').disabled = false;
      document.getElementById('checkSessionBtn').disabled = false;
      document.getElementById('logoutBtn').disabled = false;

    } catch (err) {
      showResult({ supabase_init_failed: err.message || String(err) }, 'error');
    }

    // ---- Auth functions (inlined, no separate service files needed) ----

    async function signUpOwner({ email, password, clinicName }) {
      try {
        const { data: authData, error: authError } = await supabaseClient.auth.signUp({ email, password });
        if (authError) return { success: false, error: authError.message };

        const userId = authData.user?.id;
        if (!userId) {
          return { success: false, error: 'Signup succeeded but no user ID returned. Check if email confirmation is required in Supabase settings.' };
        }

        // Call the database function that atomically creates the clinic
        // and links this user as owner, bypassing the RLS chicken-and-egg
        // problem of a brand-new user having no clinic_id yet.
        const { data: rpcData, error: rpcError } = await supabaseClient.rpc('register_clinic', {
          clinic_name: clinicName
        });

        if (rpcError) return { success: false, error: `Clinic registration failed: ${rpcError.message}` };

        return { success: true, data: rpcData };
      } catch (err) {
        return { success: false, error: err.message || 'Unexpected error during signup.' };
      }
    }

    async function login({ email, password }) {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) return { success: false, error: error.message };
      return { success: true, data };
    }

    async function logout() {
      const { error } = await supabaseClient.auth.signOut();
      if (error) return { success: false, error: error.message };
      return { success: true };
    }

    async function getSession() {
      const { data, error } = await supabaseClient.auth.getSession();
      if (error) return { success: false, error: error.message };
      return { success: true, session: data.session };
    }

    async function getCurrentUserProfile() {
      const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
      if (sessionError || !sessionData.session) return { success: false, error: 'No active session.' };

      const authUserId = sessionData.session.user.id;
      const { data, error } = await supabaseClient
        .from('users')
        .select('id, clinic_id, staff_id, email, role')
        .eq('id', authUserId)
        .single();

      if (error) return { success: false, error: error.message };
      return { success: true, profile: data };
    }

    // ---- Button wiring ----

    document.getElementById('signupBtn').addEventListener('click', async () => {
      const clinicName = document.getElementById('clinicName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;

      if (!clinicName || !email || !password) {
        showResult({ error: 'Fill in clinic name, email, and password.' }, 'error');
        return;
      }

      showResult('Creating account…', 'loading');
      const res = await signUpOwner({ email, password, clinicName });
      showResult(res, res.success ? 'success' : 'error');
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;

      showResult('Logging in…', 'loading');
      const res = await login({ email, password });
      showResult(res, res.success ? 'success' : 'error');
    });

    document.getElementById('checkSessionBtn').addEventListener('click', async () => {
      showResult('Checking session…', 'loading');
      const sessionRes = await getSession();
      const profileRes = await getCurrentUserProfile();
      showResult({ session: sessionRes, profile: profileRes }, 'success');
    });

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      const res = await logout();
      showResult(res, res.success ? 'success' : 'error');
    });
  </script>

</body>
</html>
